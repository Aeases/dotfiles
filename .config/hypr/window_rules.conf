# Pulls up the speical workspace for these apps if they are opened normally
windowrule = workspace special:discord, match:class vesktop
windowrule = workspace special:telegram, match:class org.telegram.desktop
# If special workspace opened without any apps in; spawn the apps.
workspace = special:scratchpad, on-created-empty:[float; size 1000 800] kitty --class="kitty-spawn"
workspace = special:spotify, on-created-empty:spotify
workspace = special:discord, on-created-empty:vesktop
workspace = special:telegram, on-created-empty:Telegram

# shitty ass discord overlay
windowrule = float on, no_blur on, no_shadow on, border_size 0, match:class overlayed
