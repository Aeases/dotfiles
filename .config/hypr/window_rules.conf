
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# layer rules
layerrule = animation fade, match:namespace shell:background # ¯\_(ツ)_/¯
# layerrule = noanim, swaync-notification-window
layerrule = no_anim on, match:namespace launcher
layerrule = no_anim on, match:namespace selection
layerrule = no_anim on, above_lock true, blur on, match:namespace waybar
layerrule = no_anim on, match:namespace hyprpicker
windowrule = no_shadow on, match:class waybar
windowrule = no_shadow on, match:float 0 # no shadow on tiled windows
windowrule = no_anim on, match:class python3
# windowrule = noanim, class:org.pwmt.zathura
windowrule = no_anim on, match:class oculante
windowrule = float on, match:class kitty
layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    no_anim = on
    match:namespace = vicinae
}

windowrule = float on, match:title ControlWindow
# windowrule = float, initialClass:org.gnome.NautilusPreviewer


windowrule = no_screen_share on, match:class org.telegram.desktop

windowrule {
    name = localsend
    match:initial_class = localsend

    float = on
    size = 478 608
    animation = gnomed
    center = 1
    dim_around = 1
}

windowrule = no_initial_focus on, match:initial_class org.gnome.NautilusPreviewer
windowrule = float on, size 787 609, match:initial_title Edit, match:initial_class anki

# windowrule = match:class de.haeckerfelix.Fragments, fullscreen 1

windowrule {
    name = "godot game windows"
    match:initial_title = ^(.*(DEBUG).*)$
    border_size = 1
    rounding = 0
    no_blur = on
    no_anim = on
    no_shadow = on
}

windowrule {
    name = "godot game windows except sometimes"
    match:title = ^(.*(DEBUG).*)$
    border_size = 1
    rounding = 0
    no_blur = on
    no_anim = on
    no_shadow = on
}

windowrule {
    name = games
    match:class = ^(.*steam_app.*|gamescope)$

    animation = gnomed
    border_size = 0
    rounding = 0
    no_blur = on
    no_shadow = on
}


windowrule {
    name = bigpic
    match:title = ^(.*Steam Big Picture Mode.*)$

    no_anim = on
    rounding = 0
    no_blur = on
    no_shadow = on
}

windowrule {
    name = PictureInPicture
    match:initial_title = ^(Picture-in-Picture)

    float = on
    pin = on
}


# windowrule = scrollmouse 3.0, initialClass:steam_app_3513350


windowrule = float on, size 731 573, match:initial_title Preview, match:initial_class anki
windowrule = float on, match:initial_class fr.handbrake.ghb
# windowrulev2 = float, workspace:4
# windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.
# todo: make this only activate on fullscreenstate 2 windows (fake fullscreen windows)

# Wechat Popup rules (wechat popup windows have a intialTitle of "wechat" whereas the main window is "Wechat")
windowrule = tag +wechat_popup, match:initial_title ^(.*wechat.*)$
windowrule = no_blur on, border_size 0, no_shadow on, match:tag wechat_popup

# windowrule=opacity 0.3, initialTitle:Sign in to Steam
# windowrulev2 = move onscreen 100% 100%, tag: pip

# SMART GAPS
workspace = w[tv1]s[false], gapsout:0, gapsin:0
windowrule = border_size 0, no_shadow on, rounding 0, match:float 0, match:workspace w[tv1]s[false]
windowrule = border_size 0, rounding 0, match:float 0, match:workspace f[1]s[false]

# Properties applied if s[1] (if on a special workspace)
workspace = s[1], gapsout:15
workspace = s[1], rounding:1
windowrule = rounding 15, animation slide, border_color rgba(f12711ee) rgba(f5af19ee) 270deg, border_size 3, match:workspace s[1]

# Tag file portals, / file pickers
windowrule = tag +file-portal, float on, match:initial_class ^(.*org.gnome.Nautilus)$, match:initial_title negative:^(.*(Loading|Properties).*)$
# works because when nautilus windows are opened as a file picker, e.g. by firefox they are given a class that they apply immediately. Regular nautilus windows however always start off with a class of "Loading" so matching anything without that initial class will be a file picker window.
#    this will probably break with a gnome upadte or soemthing
# i also match the properties window as a file picker window so it looks nice when i open it.

# Make file portal open nice
windowrule = rounding 10, border_size 0, persistent_size on, match:tag file-portal
# windowrule = noshadow,tag:file-portal
# windowrulev2 = animation none,tag:file-portal
# windowrule = center,tag:file-portal
# windowrule = dimaround,tag:file-portal
# windowrule = suppressevents activatefocus, tag:file-portal

# round the properties window, cus it looks ugly if u dont
windowrule = rounding 10, match:initial_class ^(.*org.gnome.Nautilus.*)$, match:initial_title ^(.*Properties.*)$



windowrule = workspace special:ActivityHell, match:initial_title PT Activity # fuck packet tracer activity window
windowrule = render_unfocused on, match:class PacketTracer # Prevents lagging when main window is not on the current workspace

# so the lyrics still scroll when spotify is not in view.
windowrule = render_unfocused on, workspace special:spotify, match:class spotify

windowrule = float on, match:title Sign in – Google accounts
windowrule = idle_inhibit fullscreen, match:class .*
# ^^^ no auto-idle if fullscreen (hypridle looks at this)




windowrule = border_color rgb(FDFC47) rgb(24FE41) 45deg, rounding 10, match:title ^(.*All Of Human History In One Hour.*)$

# ffplay
windowrule = keep_aspect_ratio on, match:initial_class guvcview
windowrule = pin on, border_color rgb(FDFC47) rgb(24FE41) 45deg, rounding 10, match:class guvcview

# satty rules
windowrule = border_color rgb(FDFC47), match:class com.gabm.satty
windowrule = keep_aspect_ratio on, no_shadow on, animation fadeOut, pin on, match:initial_class com.gabm.satty

